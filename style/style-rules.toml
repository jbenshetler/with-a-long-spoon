# style-rules.toml — prose style tics to flag for "With a Long Spoon".
#
# Recall-first: these FLAG, they do not fix. Many rules (especially the
# structural regex ones) are deliberately high-recall and WILL catch legitimate
# prose — that is the point. You read the density and decide. Tune freely.
#
#   kind = "phrase"  → literal text, matched on word boundaries, case-insensitive
#                      (set case_sensitive = true to force exact case).
#   kind = "regex"   → raw PCRE (the `regex` module). Use TOML '' literal strings
#                      so backslashes need no escaping. Case-sensitive by default;
#                      set case_insensitive = true, or prefix the pattern with (?i).
#
# Fields: id, kind, phrase|pattern, severity (error|warn|info), why,
#         optional suggest, optional unless (suppress a hit if this pattern also
#         matches the hit's line), optional scope (scenes|meta), optional case flags.

# ---- Filtered / weak constructions -----------------------------------------

[[rule]]
id       = "the-way"
kind     = "phrase"
phrase   = "the way"
severity = "warn"
why      = "Filtered construction ('the way he…'); usually telling. Cut or recast into the direct image."

[[rule]]
id       = "filter-verbs"
kind     = "regex"
pattern  = '(?i)\b(?:she|he|they|i)\s+(?:could\s+)?(?:felt|saw|noticed|watched|realized|realised|sensed|heard)\b'
severity = "warn"
why      = "Filter verb distances the reader from sensation. 'Body before mind' — render the thing, not the perceiving of it."

[[rule]]
id       = "began-to"
kind     = "regex"
pattern  = '(?i)\b(?:began|started)\s+to\b'
severity = "info"
why      = "Throat-clearing aspect. 'She began to walk' → 'She walked.'"

[[rule]]
id       = "there-was-were"
kind     = "regex"
pattern  = '(?i)\bthere\s+(?:was|were)\b'
severity = "info"
why      = "Existential 'there was…' often buries the real subject. Consider recasting."

# ---- Structural tics --------------------------------------------------------

[[rule]]
id       = "x-not-y"
kind     = "regex"
pattern  = '\b\w+,\s+not\s+\w+'
severity = "info"
why      = "Antithesis 'X, not Y' — fine once, a tic in bulk. Watch the density across the scene."

[[rule]]
id       = "not-x-but-y"
kind     = "regex"
pattern  = '(?i)\bnot\s+(?:\w+[\s,]+){1,6}but\b'
severity = "info"
why      = "'Not X but Y' antithesis (X may be several words) — same construction as x-not-y. Vary or cut if it clusters."
unless   = '(?i)\bnot\s+only\b'   # 'not only … but also' is a correlative, not the tic

[[rule]]
id       = "empty-balance"
kind     = "regex"
pattern  = '''(?i)(?:\bnot|n['’]t)\s+(?:\w+\s+){0,2}?ma[dk]e[sn]?\s+(?:\w+\s+){0,3}?less\b'''
severity = "info"
why      = "Concessive balanced-negation ('X did not make it less Y') — often a FALSE antithesis: the terms don't actually exclude, so the sentence borrows the music of paradox with none of its content. Check X and Y genuinely oppose; delete-test the negated half — if only cadence is lost, cut it."

# ---- Lexical / word-choice tics ---------------------------------------------

[[rule]]
id       = "weather"
kind     = "phrase"
phrase   = "weather"
severity = "warn"
why      = "'weather' as metaphor (sensation/mood as 'weather') is a tic. Allowed ONLY for literal meteorology — recast any figurative use."

[[rule]]
id       = "a-small"
kind     = "regex"
pattern  = '(?i)\ba\s+small\s+\w+'
severity = "warn"
why      = "'a small X' is the tic — substantially reduce. Cut, or choose a more specific image."

[[rule]]
id       = "file-verb"
kind     = "regex"
pattern  = '(?i)(?<!\b(?:a|an|the|this|that|these|those|her|his|my|your|our|their|its|each|every|one|paper|case|nail|single|whole|personnel|on)\s)\b(?:re-?)?fil(?:e|es|ed|ing)\b'
severity = "warn"
why      = "'file' as a verb (categorizing/re-filing experience as paperwork) is a tic. Recast the categorization image; noun uses are fine."

[[rule]]
id       = "catalog-verb"
kind     = "regex"
pattern  = '(?i)(?<!\b(?:a|an|the|this|that|these|those|her|his|my|your|our|their|its)\s)\bcatalog(?:ue)?(?:s|ed|ing|d)?\b'
severity = "warn"
why      = "'catalog' as a verb (cataloging/itemizing experience) is a tic. Recast; noun uses are fine."

[[rule]]
id       = "learn"
kind     = "regex"
pattern  = '(?i)\blearn(?:s|ed|ing)?\b'
severity = "info"
why      = "Not a tic — a default-reach word the assistant favors. On each hit, double-check it's the precise verb and not autopilot; often it isn't."

[[rule]]
id       = "without-asking"
kind     = "phrase"
phrase   = "without asking"
severity = "warn"
why      = "'without asking' telegraphs the consent theme. Render the act; let the absence of asking land without the label."

[[rule]]
id       = "out-ahead"
kind     = "phrase"
phrase   = "out ahead"
severity = "warn"
why      = "'out ahead (of her)' — the body-before-mind tic (want/need arriving before thought). The idea is right; the phrasing is overused. Vary the image."
suggest  = "her body arrived before her mind / before she'd decided / faster than thought / her want got there first / her body outran her."

[[rule]]
id       = "whole-of"
kind     = "phrase"
phrase   = "whole of"
severity = "warn"
why      = "'the whole of her / the whole of it' — the totality/absorption tic, overused. Cut to 'all of', or recast to a concrete image. Keep only rarely, with the author's direction."

[[rule]]
id       = "unhurried"
kind     = "phrase"
phrase   = "unhurried"
severity = "warn"
why      = "'unhurried' — the slow/in-control tic, badly overused (80+ times across scenes, a 14-hit cluster in vee-on-the-bench). Thin drastically; save it for the rare load-bearing beat. Vary the image — don't just swap in another reach-word."
suggest  = "slow / took his time / in no rush / patient / without hurry / let it take its time (pick per beat; vary, don't substitute one tic for another)"

[[rule]]
id       = "vivienne"
kind     = "phrase"
phrase   = "Vivienne"
severity = "warn"
scope    = "scenes"
why      = "The name-toggle: 'Vivienne' (vs 'Vee') carries weight and must stay RARE and deliberate — used only with the author's direction (he says it once deliberately; she signs something formal; her mother is angry). Flag EVERY use for author sign-off; --ack the sanctioned ones."

# ---- Recognition / appreciation beat tics -----------------------------------

[[rule]]
id       = "there-she-is"
kind     = "regex"
pattern  = '(?i)\bthere\s+(?:she|he|you|they)\s+(?:is|are)\b'
severity = "warn"
why      = "'There she is' / 'there you are' — the tender-recognition reveal beat, badly overused. Recast or cut."

[[rule]]
id       = "look-at-her"
kind     = "regex"
pattern  = '(?i)\blook\s+at\s+(?:her|him|you|them)\b'
severity = "warn"
why      = "'Look at her' / 'look at you' — the appreciation beat, badly overused. Recast or cut."

[[rule]]
id       = "undone"
kind     = "regex"
pattern  = '(?i)\b(?:undone|undid)\b'
severity = "warn"
why      = "'undone/undid' for sexual excitement or orgasm is a tic. Fine for literal unfastening (clothes, laces, a belt) — those are auto-suppressed. When it means arousal or climax, recast."
suggest  = "climax: came apart / broke / went over / came / unraveled / gave way / shattered. excitement: unstrung / wrecked / went weak / came loose / lost the shape of herself."
unless   = '(?i)\b(?:belt|button|buttons|buckle|buckled|clasp|clasps|lace|laces|laced|zip|zipper|zipped|knot|cuff|cuffs|hook|hooks|snap|snaps|sash|corset|bodice|apron|strap|straps|robe|shirt|blouse|dress|bra|collar|fly|button-?up)\b'

# ---- Hard canon rules (never name, never explain) ---------------------------

[[rule]]
id       = "never-name"
kind     = "regex"
pattern  = '(?i)\b(?:autis\w*|asperger\w*|neurodiverg\w*|on the spectrum|diagnos\w*)\b'
severity = "error"
scope    = "scenes"
why      = "CRAFT RULE: Pace's neurodivergence is NEVER named on the page — it lives only in behavior. Remove."
